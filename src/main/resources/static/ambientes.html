<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGA - Sistema de Gestão Acadêmica</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
<div class="sidebar">
    <div class="logo-area">
        <h1 class="logo-text">SGA</h1>
        <span class="user-role-text">Papel: Gestor</span>
    </div>
    <nav class="nav-links">
        <button class="nav-item"><i class="fas fa-bell"></i> Solicitações</button>
        <button class="nav-item active"><i class="fas fa-map"></i> Mapa</button>
        <button class="nav-item"><i class="fas fa-cog"></i> Configurações</button>
    </nav>
</div>

<div class="main-content">
    <header class="main-header">
        <div class="header-top">
            <div class="back-circle-decoration">
                <i class="fas fa-chevron-left"></i>
            </div>
            <div class="header-labels">
                <span class="label-sala">Sala:</span>
                <span class="label-equip">Equipamento:</span>
            </div>
        </div>
    </header>

    <div class="data-table">
        <div id="listaAmbientes" class="table-body"></div>
    </div>

    <button class="btn-add-action" onclick="abrirModal()">Adicionar nova sala</button>
</div>

<div id="modalAmbiente" class="modal">
    <div class="modal-window">
        <h2 id="modalTitle">ADICIONANDO NOVA SALA</h2>
        <form id="formAmbiente">
            <div class="field-box">
                <label>Nome do Ambiente</label>
                <input type="text" id="campoNome" placeholder="Digite a sala" required>
            </div>
            <div class="field-box">
                <label>Capacidade</label>
                <input type="number" id="campoCapacidade" placeholder="Capacidade física" required>
            </div>
            <div class="field-box">
                <label>Equipamentos</label>
                <textarea id="campoEquipamentos" placeholder="Ex: Projetor, TV..."></textarea>
            </div>
            <div class="field-box">
                <label>Descrição</label>
                <textarea id="campoDescricao" placeholder="Digite a descrição"></textarea>
            </div>
            <div class="actions-box">
                <button type="submit" class="btn-confirm">Salvar</button>
                <button type="button" id="btnExcluirModal" class="btn-delete-modal" onclick="deletarNoModal()">Excluir</button>
                <button type="button" class="btn-close" onclick="fecharModal()">Cancelar</button>
            </div>
        </form>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
