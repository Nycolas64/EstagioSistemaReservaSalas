<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGA - Sistema de Gestão Acadêmica</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="sidebar">
    <div class="logo-area">
        <h1>SGA</h1>
    </div>
    <nav class="nav-links">
        <button class="nav-item">SOLICITAÇÕES</button>
        <button class="nav-item">MAPA</button>
        <button class="nav-item active">CONFIGURAÇÕES</button>
    </nav>
    <div class="user-role">
        <span>Papel: Gestor</span>
    </div>
</div>

<div class="main-content">
    <header class="main-header">
        <h2 class="glitch-title">SGA</h2>
        <button class="btn-add-action" onclick="abrirModal()">Adicionar nova sala</button>
    </header>

    <div class="data-table">
        <div class="table-head">
            <span>Sala:</span>
            <span>Equipamento:</span>
            <span>Ações</span>
        </div>
        <div id="listaAmbientes" class="table-body">
        </div>
    </div>
</div>

<div id="modalAmbiente" class="modal">
    <div class="modal-window">
        <h2 id="modalTitle">Adicionando Nova Sala</h2>
        <form id="formAmbiente">
            <div class="field-box">
                <label>Nome do Ambiente</label>
                <input type="text" id="campoNome" placeholder="Digite a sala" required>
            </div>
            <div class="field-box">
                <label>Capacidade</label>
                <input type="number" id="campoCapacidade" placeholder="Capacidade física" required>
            </div>
            <div class="field-box">
                <label>Equipamentos</label>
                <textarea id="campoEquipamentos" placeholder="Ex: Projetor, TV..."></textarea>
            </div>
            <div class="field-box">
                <label>Descrição</label>
                <textarea id="campoDescricao" placeholder="Digite a descrição"></textarea>
            </div>
            <div class="actions-box">
                <button type="submit" class="btn-confirm">Salvar</button>
                <button type="button" class="btn-close" onclick="fecharModal()">Cancelar</button>
            </div>
        </form>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
